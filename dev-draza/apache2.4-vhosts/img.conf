<VirtualHost *:80>
	ServerAdmin info@exs.lv
	ServerName img.exs.lv
	ServerAlias img0.exs.lv
	ServerAlias img1.exs.lv
	ServerAlias img2.exs.lv

	DocumentRoot /home/www/img.exs.lv/
	<Directory />
		Options FollowSymLinks
		AllowOverride None
	</Directory>
	<Directory /home/www/img.exs.lv/>
		Options FollowSymLinks MultiViews
		AllowOverride All
		Require all granted
		ExpiresActive on
		ExpiresByType image/png "access plus 1 month"
		ExpiresByType image/gif "access plus 1 month"
		ExpiresByType image/jpeg "access plus 1 month"
	</Directory>

	php_value engine off

</VirtualHost>

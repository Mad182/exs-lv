<VirtualHost *:443>
	ServerAdmin info@exs.lv
	ServerName m.exs.lv
	ServerAlias www.m.exs.lv
	ServerAlias m.rp.exs.lv
	ServerAlias m.lol.exs.lv
	ServerAlias m.runescape.exs.lv
	ServerAlias m.coding.lv
	ServerAlias mlol.exs.lv
	ServerAlias mrs.exs.lv

	DocumentRoot /home/www/m.exs.lv
	<Directory />
		Options FollowSymLinks
		AllowOverride All
	</Directory>
	<Directory /home/www/m.exs.lv/>
		Options FollowSymLinks
		AllowOverride All
		Require all granted

                ExpiresActive on
                ExpiresByType image/png "access plus 1 month"
                ExpiresByType image/gif "access plus 1 month"
                ExpiresByType image/jpeg "access plus 1 month"
                ExpiresByType text/css "access plus 1 day"
                ExpiresByType text/javascript "access plus 1 day"

                AddOutputFilterByType DEFLATE text/html
                AddOutputFilterByType DEFLATE text/plain
                AddOutputFilterByType DEFLATE text/xml
                AddOutputFilterByType DEFLATE text/css
                AddOutputFilterByType DEFLATE text/javascript
                AddOutputFilterByType DEFLATE application/javascript
                AddOutputFilterByType DEFLATE application/xhtml+xml
                AddOutputFilterByType DEFLATE application/xml
                AddOutputFilterByType DEFLATE application/rss+xml
                AddOutputFilterByType DEFLATE application/x-javascript
                AddOutputFilterByType DEFLATE application/x-httpd-php
                AddOutputFilterByType DEFLATE application/x-httpd-fastphp

	</Directory>

	ErrorLog /var/log/apache2/error.log

	# Possible values include: debug, info, notice, warn, error, crit,
	# alert, emerg.
	LogLevel warn

        SSLEngine on
        SSLCertificateFile /etc/apache2/ssl_new/STAR_exs_lv.crt
        SSLCertificateKeyFile /etc/apache2/ssl_new/exs.key
        SSLCACertificateFile /etc/apache2/ssl_new/exs.lv.cer

        # Use HTTP Strict Transport Security to force client to use secure connections only
        Header always set Strict-Transport-Security "max-age=31536000"

</VirtualHost>
